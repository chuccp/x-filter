<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <linearGradient id="xgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
  </defs>

  <!-- Rounded background circle -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Shield shape -->
  <path d="M256 60 L380 120 L380 280 C380 370 320 430 256 460 C192 430 132 370 132 280 L132 120 Z"
        fill="url(#shield)" stroke="#ff6b81" stroke-width="4"/>

  <!-- X mark / filter lines -->
  <g stroke="url(#xgrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left slash of X -->
    <line x1="195" y1="190" x2="317" y2="310"/>
    <!-- Right slash of X -->
    <line x1="317" y1="190" x2="195" y2="310"/>
  </g>

  <!-- Small filter dots above the X -->
  <circle cx="200" cy="155" r="8" fill="white" opacity="0.6"/>
  <circle cx="256" cy="140" r="8" fill="white" opacity="0.8"/>
  <circle cx="312" cy="155" r="8" fill="white" opacity="0.6"/>
</svg>
